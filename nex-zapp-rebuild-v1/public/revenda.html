<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>NEX-ZAPP Revenda</title><style>
:root{--bg:#050816;--panel:#0f172a;--panel2:#111827;--field:#070d18;--line:#243044;--text:#f8fafc;--muted:#94a3b8;--blue:#2563eb;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;--shadow:0 24px 80px rgba(0,0,0,.42)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#172554 0%,#0b1120 38%,#050816 100%);color:var(--text)}a{color:inherit}button{border:0;border-radius:14px;padding:12px 14px;background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;font-weight:900;cursor:pointer;box-shadow:0 12px 28px rgba(37,99,235,.22)}button.green{background:linear-gradient(135deg,var(--green),#16a34a)}button.red{background:linear-gradient(135deg,var(--red),#b91c1c)}button.gray{background:#475569;box-shadow:none}button.purple{background:linear-gradient(135deg,var(--purple),#6d28d9)}input,textarea,select{width:100%;border:1px solid var(--line);background:#070d18;color:var(--text);border-radius:14px;padding:12px;outline:none;font-size:16px}textarea{min-height:110px}label{display:block;color:#cbd5e1;font-weight:850;margin:12px 0 7px;font-size:13px}.card{background:linear-gradient(180deg,rgba(17,24,39,.96),rgba(15,23,42,.9));border:1px solid rgba(148,163,184,.16);border-radius:24px;padding:18px;box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.s3{grid-column:span 3}.s4{grid-column:span 4}.s5{grid-column:span 5}.s6{grid-column:span 6}.s7{grid-column:span 7}.s8{grid-column:span 8}.s12{grid-column:span 12}.desc{color:var(--muted);line-height:1.5}.btnrow{display:flex;gap:10px;flex-wrap:wrap}.btnrow button{flex:1}.badge{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;background:rgba(148,163,184,.12);color:#cbd5e1}.badge.pending{background:rgba(245,158,11,.14);color:#fbbf24}.badge.approved,.badge.active,.badge.paid{background:rgba(34,197,94,.14);color:#86efac}.badge.canceled,.badge.blocked{background:rgba(239,68,68,.14);color:#fca5a5}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:12px;border-bottom:1px solid rgba(148,163,184,.12);text-align:left;vertical-align:top}th{color:#cbd5e1;font-size:12px;text-transform:uppercase}.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}.sidebar{height:100vh;position:sticky;top:0;background:rgba(7,11,24,.96);border-right:1px solid rgba(148,163,184,.14);padding:22px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}.logo{width:50px;height:50px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#0f172a);font-weight:950}.brand h1{margin:0;font-size:23px}.brand small{color:var(--muted)}.nav{display:grid;gap:8px}.nav button{width:100%;justify-content:flex-start;text-align:left;background:transparent;box-shadow:none;border:1px solid transparent}.nav button.active{background:rgba(37,99,235,.18);border-color:rgba(96,165,250,.35)}main{padding:24px;max-width:1500px;width:100%;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.top h2{margin:0;font-size:34px}.page{display:none}.page.active{display:block}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{padding:16px;border-radius:20px;background:#070d18;border:1px solid var(--line)}.stat span{color:var(--muted);font-weight:800}.stat b{display:block;font-size:30px;margin-top:6px}.mobilebar{display:none}.toast{position:fixed;right:18px;bottom:18px;z-index:999;background:#070d18;border:1px solid rgba(34,197,94,.28);border-radius:18px;padding:14px 16px;display:none;box-shadow:var(--shadow)}.toast.show{display:block}.modal-bg{display:none;position:fixed;inset:0;z-index:990;background:rgba(2,6,23,.72);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:18px}.modal-bg.active{display:flex}.modal{width:100%;max-width:560px;max-height:92vh;overflow:auto;background:#111827;border:1px solid var(--line);border-radius:26px;padding:20px}.password-wrap{position:relative}.password-wrap input{padding-right:48px}.eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:36px;height:36px;padding:0;background:rgba(148,163,184,.18)!important;box-shadow:none}.hidden{display:none!important}
@media(max-width:1050px){body{padding-bottom:86px;overflow-x:hidden}.app{display:block}.sidebar{display:none}main{padding:12px}.mobilebar{display:flex;position:fixed;left:10px;right:10px;bottom:8px;z-index:900;background:rgba(7,13,24,.94);border:1px solid rgba(148,163,184,.18);border-radius:24px;padding:8px;gap:6px;overflow:auto;box-shadow:0 16px 45px rgba(0,0,0,.5);backdrop-filter:blur(12px)}.mobilebar button{flex:1 0 72px;min-width:72px;background:transparent!important;box-shadow:none!important;font-size:11px!important;padding:9px 7px!important;border-radius:17px}.mobilebar button.active{background:linear-gradient(135deg,rgba(37,99,235,.42),rgba(29,78,216,.18))!important}.top{display:block}.top h2{font-size:29px}.top .btnrow{margin-top:12px}.grid{gap:12px}.s3,.s4,.s5,.s6,.s7,.s8{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr);gap:10px}.stat{padding:13px;min-height:88px}.stat b{font-size:25px}.card{padding:14px;border-radius:22px}.table-wrap{overflow:visible}table,thead,tbody,tr,th,td{display:block;width:100%}thead{display:none}table{min-width:0}tr{background:#070d18;border:1px solid var(--line);border-radius:18px;margin-bottom:10px;padding:12px;display:grid;gap:8px}td{border:0;padding:0}td:before{content:attr(data-label);display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:3px}}
.wrap{max-width:1150px;margin:0 auto;padding:18px}.copybox{background:#070d18;border:1px solid var(--line);border-radius:14px;padding:12px;word-break:break-all}
/* NEX-ZAPP Rebuild V2 Premium UI */
.icon{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;display:inline-block;vertical-align:middle}
.nav button{display:flex;align-items:center;gap:10px}
.mobilebar button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.mobilebar .icon{width:18px;height:18px}
.card,.stat,.session-card,.send-card,.ad-item,.group-item,.delay-card{transition:.22s ease;position:relative}
.card:hover,.stat:hover,.session-card:hover,.send-card:hover,.ad-item:hover,.group-item:hover,.delay-card:hover{transform:translateY(-2px);border-color:rgba(96,165,250,.35)}
.stat{overflow:hidden}
.stat:before{content:"";position:absolute;right:-22px;top:-22px;width:92px;height:92px;border-radius:999px;background:rgba(37,99,235,.13)}
.stat-head{display:flex;align-items:center;gap:10px;color:#cbd5e1;font-weight:900}
.stat-icon{width:42px;height:42px;border-radius:16px;background:rgba(37,99,235,.16);border:1px solid rgba(96,165,250,.24);display:grid;place-items:center;color:#93c5fd}
.hero-card{background:linear-gradient(135deg,rgba(37,99,235,.33),rgba(15,23,42,.9));border:1px solid rgba(96,165,250,.22);border-radius:28px;padding:22px;margin-bottom:16px;box-shadow:var(--shadow)}
.hero-card h3{margin:0;font-size:28px}
.hero-card p{color:#cbd5e1;margin:8px 0 0;line-height:1.5}
.progress-line{height:10px;background:#070d18;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-top:12px}
.progress-line span{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#2563eb);border-radius:999px}
.session-grid{grid-template-columns:repeat(3,minmax(260px,1fr))!important}
.session-card{padding:18px;border-radius:26px;background:linear-gradient(180deg,rgba(15,23,42,.98),rgba(7,13,24,.94));border:1px solid rgba(148,163,184,.18);box-shadow:0 18px 55px rgba(0,0,0,.32);overflow:hidden}
.session-card:before{content:"";position:absolute;inset:-1px;background:radial-gradient(circle at top right,rgba(37,99,235,.18),transparent 42%);pointer-events:none}
.session-card.connected{border-color:rgba(34,197,94,.45)}
.session-card.waiting{border-color:rgba(245,158,11,.5)}
.session-card.offline{border-color:rgba(239,68,68,.28)}
.session-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.session-main{display:flex;align-items:center;gap:12px}
.session-icon{width:54px;height:54px;border-radius:20px;display:grid;place-items:center;background:rgba(37,99,235,.18);border:1px solid rgba(96,165,250,.24);color:#93c5fd}
.session-card.connected .session-icon{background:rgba(34,197,94,.14);border-color:rgba(34,197,94,.3);color:#86efac}
.session-card.waiting .session-icon{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.3);color:#fbbf24}
.session-card h3{margin:0;font-size:22px}
.session-status{display:inline-flex;align-items:center;gap:8px;margin-top:8px;padding:7px 10px;border-radius:999px;background:rgba(148,163,184,.12);font-weight:950;font-size:13px}
.dot{width:8px;height:8px;border-radius:50%;background:#94a3b8;box-shadow:0 0 0 4px rgba(148,163,184,.12)}
.session-card.connected .dot{background:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.14)}
.session-card.waiting .dot{background:#f59e0b;box-shadow:0 0 0 4px rgba(245,158,11,.14)}
.session-card.offline .dot{background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,.14)}
.connect-steps{display:grid;gap:8px;margin:14px 0;padding:12px;background:rgba(2,6,23,.38);border:1px solid rgba(148,163,184,.12);border-radius:18px}
.step{display:flex;align-items:center;gap:10px;color:#94a3b8;font-size:13px;font-weight:800}
.step.active{color:#fbbf24}.step.done{color:#86efac}
.loader-ring{width:18px;height:18px;border:3px solid rgba(148,163,184,.25);border-top-color:#60a5fa;border-radius:50%;animation:nzspin .8s linear infinite}
@keyframes nzspin{to{transform:rotate(360deg)}}
.session-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.info-chip{background:rgba(7,13,24,.78);border:1px solid rgba(148,163,184,.12);border-radius:16px;padding:10px}
.info-chip small{display:block;color:#94a3b8;font-weight:850;font-size:11px;text-transform:uppercase}
.info-chip b{display:block;margin-top:3px}
.session-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.session-actions button{padding:10px;font-size:13px}
.qr-panel{margin-top:12px;padding:12px;border:1px dashed rgba(96,165,250,.35);border-radius:18px;text-align:center;background:rgba(37,99,235,.08)}
.qr-panel p{margin:6px 0;color:#cbd5e1}
.explain-box{display:flex;gap:12px;align-items:flex-start;background:rgba(37,99,235,.10);border:1px solid rgba(96,165,250,.22);border-radius:18px;padding:12px;margin-top:12px;color:#cbd5e1}
.explain-box .icon{color:#93c5fd;flex:0 0 auto}
.clean-pre{font-size:12px;margin-top:12px}
.send-card{display:flex;gap:10px;align-items:center}
.send-card input{width:auto}
.send-card .send-ico{width:34px;height:34px;border-radius:13px;background:rgba(37,99,235,.13);display:grid;place-items:center;color:#93c5fd;flex:0 0 auto}
.send-card.connected .send-ico{background:rgba(34,197,94,.13);color:#86efac}
@media(max-width:1050px){.session-grid{grid-template-columns:1fr!important}.hero-card{padding:16px}.hero-card h3{font-size:23px}.session-info{grid-template-columns:1fr}}

</style></head><body><div class="wrap"><div class="top"><div><h2>Área do Revendedor</h2><p class="desc">Comissões, indicações e saques.</p></div><div class="btnrow"><button onclick="loadMe()">Atualizar</button><button class="red" onclick="logout()">Sair</button></div></div><div class="stats"><div class="stat"><div class="stat-head"><div class="stat-icon" data-ico="wallet"></div><span>Total</span></div><b id="sTotal">R$0</b></div><div class="stat"><div class="stat-head"><div class="stat-icon" data-ico="activity"></div><span>Disponível</span></div><b id="sAvail">R$0</b></div><div class="stat"><div class="stat-head"><div class="stat-icon" data-ico="check"></div><span>Pago</span></div><b id="sPaid">R$0</b></div><div class="stat"><div class="stat-head"><div class="stat-icon" data-ico="clock"></div><span>Pendente</span></div><b id="sPend">R$0</b></div></div><div class="grid" style="margin-top:16px"><div class="card s6"><h3>Meu link</h3><p class="desc">Compartilhe esse link para receber comissão.</p><div class="copybox" id="linkBox"></div><button class="green" style="width:100%;margin-top:10px" onclick="navigator.clipboard.writeText(linkBox.textContent);toast('Link copiado')">Copiar link</button><h3>Solicitar saque</h3><label>Valor</label><input id="wdValue" type="number"><button class="green" style="width:100%;margin-top:10px" onclick="withdraw()">Solicitar saque</button></div><div class="card s6"><h3>Dados</h3><div id="resInfo" class="desc"></div></div><div class="card s6"><h3>Comissões</h3><div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Plano</th><th>Venda</th><th>Comissão</th></tr></thead><tbody id="commTable"></tbody></table></div></div><div class="card s6"><h3>Saques</h3><div class="table-wrap"><table><thead><tr><th>Valor</th><th>Status</th><th>Data</th></tr></thead><tbody id="wdTable"></tbody></table></div></div></div></div><div id="toast" class="toast"></div><script>

function icon(name, cls='icon'){
  const icons={
    home:'<path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/>',
    message:'<path d="M21 15a4 4 0 0 1-4 4H7l-4 4V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>',
    megaphone:'<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
    list:'<path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/>',
    users:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    wallet:'<path d="M20 12V8H6a2 2 0 0 1 0-4h12v4"/><path d="M4 6v14a2 2 0 0 0 2 2h14v-4"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/>',
    send:'<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
    qrcode:'<rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/>',
    refresh:'<path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 8h5V3"/>',
    power:'<path d="M12 2v10"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/>',
    shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="m9 12 2 2 4-4"/>',
    activity:'<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',
    clock:'<circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>',
    check:'<path d="M20 6 9 17l-5-5"/>',
    x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
    image:'<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.5-3.5a2 2 0 0 0-3 0L5 21"/>',
    video:'<path d="m22 8-6 4 6 4V8Z"/><rect x="2" y="6" width="14" height="12" rx="2"/>',
    file:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/>'
  };
  const body=icons[name]||icons.activity;
  return `<svg class="${cls}" viewBox="0 0 24 24" aria-hidden="true">${body}</svg>`;
}


function qs(s){return document.querySelector(s)}function qsa(s){return [...document.querySelectorAll(s)]}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function esc(s){return String(s??'').replace(/[&<>"']/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[x]))}
function badge(s){return `<span class="badge ${String(s||'').toLowerCase()}">${esc(s||'-')}</span>`}
function toast(t){let el=qs('#toast');if(!el)return alert(t);el.innerHTML=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}
function token(){return localStorage.getItem('nz_token')||''}
async function api(u,o={}){o.headers=Object.assign({},o.headers||{}, token()?{Authorization:'Bearer '+token()}:{});let r=await fetch(u,o);let j=await r.json().catch(()=>({success:false,error:'Erro'}));if(r.status===401){localStorage.removeItem('nz_token');location.href='/'}return j}
function setupEyes(){qsa('input[type=password]').forEach(input=>{if(input.dataset.eye)return;input.dataset.eye=1;let w=document.createElement('div');w.className='password-wrap';input.parentNode.insertBefore(w,input);w.appendChild(input);let b=document.createElement('button');b.type='button';b.className='eye-btn';b.textContent='👁';b.onclick=()=>{input.type=input.type==='password'?'text':'password';b.textContent=input.type==='password'?'👁':'🙈'};w.appendChild(b)})}
function labels(){qsa('.table-wrap table').forEach(t=>{let h=qsa('thead th').map(x=>x.textContent.trim());t.querySelectorAll('tbody tr').forEach(tr=>[...tr.children].forEach((td,i)=>td.setAttribute('data-label',h[i]||'')))})}
document.addEventListener('DOMContentLoaded',()=>{setupEyes();setInterval(labels,1000)})

function logout(){localStorage.removeItem('nz_token');location.href='/'}async function loadMe(){let r=await api('/api/reseller/me');if(!r.success)return toast(r.error||'Erro');let s=r.stats||{}, re=r.reseller||{};sTotal.textContent=money(s.total);sAvail.textContent=money(s.available);sPaid.textContent=money(s.paid);sPend.textContent=money(s.pending);linkBox.textContent=location.origin+'/?ref='+(re.code||'');resInfo.innerHTML=`Nome: <b>${esc(re.name)}</b><br>E-mail: ${esc(re.email)}<br>Status: ${badge(re.status)}<br>Chave PIX: ${esc(re.pixKey)}`;commTable.innerHTML=(r.commissions||[]).map(c=>`<tr><td>${esc(c.clientName)}</td><td>${esc(c.planName)}</td><td>${money(c.saleValue)}</td><td>${money(c.value)}</td></tr>`).join('')||'<tr><td colspan="4">Sem comissões.</td></tr>';wdTable.innerHTML=(r.withdrawals||[]).map(w=>`<tr><td>${money(w.value)}</td><td>${badge(w.status)}</td><td>${esc((w.createdAt||'').slice(0,10))}</td></tr>`).join('')||'<tr><td colspan="3">Sem saques.</td></tr>';labels()}async function withdraw(){let r=await api('/api/reseller/withdraw',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({value:wdValue.value})});toast(r.success?'Saque solicitado':r.error);loadMe()}loadMe()
function hydrateIcons(){document.querySelectorAll('[data-ico]').forEach(el=>{el.innerHTML=icon(el.dataset.ico)});}document.addEventListener('DOMContentLoaded',()=>setTimeout(hydrateIcons,100));
</script></body></html>
