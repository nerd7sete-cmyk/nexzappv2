<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><title>NEX-ZAPP</title><style>
:root{--bg:#050816;--panel:#0f172a;--panel2:#111827;--field:#070d18;--line:#243044;--text:#f8fafc;--muted:#94a3b8;--blue:#2563eb;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;--shadow:0 24px 80px rgba(0,0,0,.42)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top,#172554 0%,#0b1120 38%,#050816 100%);color:var(--text)}a{color:inherit}button{border:0;border-radius:14px;padding:12px 14px;background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;font-weight:900;cursor:pointer;box-shadow:0 12px 28px rgba(37,99,235,.22)}button.green{background:linear-gradient(135deg,var(--green),#16a34a)}button.red{background:linear-gradient(135deg,var(--red),#b91c1c)}button.gray{background:#475569;box-shadow:none}button.purple{background:linear-gradient(135deg,var(--purple),#6d28d9)}input,textarea,select{width:100%;border:1px solid var(--line);background:#070d18;color:var(--text);border-radius:14px;padding:12px;outline:none;font-size:16px}textarea{min-height:110px}label{display:block;color:#cbd5e1;font-weight:850;margin:12px 0 7px;font-size:13px}.card{background:linear-gradient(180deg,rgba(17,24,39,.96),rgba(15,23,42,.9));border:1px solid rgba(148,163,184,.16);border-radius:24px;padding:18px;box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.s3{grid-column:span 3}.s4{grid-column:span 4}.s5{grid-column:span 5}.s6{grid-column:span 6}.s7{grid-column:span 7}.s8{grid-column:span 8}.s12{grid-column:span 12}.desc{color:var(--muted);line-height:1.5}.btnrow{display:flex;gap:10px;flex-wrap:wrap}.btnrow button{flex:1}.badge{display:inline-flex;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900;background:rgba(148,163,184,.12);color:#cbd5e1}.badge.pending{background:rgba(245,158,11,.14);color:#fbbf24}.badge.approved,.badge.active,.badge.paid{background:rgba(34,197,94,.14);color:#86efac}.badge.canceled,.badge.blocked{background:rgba(239,68,68,.14);color:#fca5a5}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:12px;border-bottom:1px solid rgba(148,163,184,.12);text-align:left;vertical-align:top}th{color:#cbd5e1;font-size:12px;text-transform:uppercase}.app{min-height:100vh;display:grid;grid-template-columns:280px 1fr}.sidebar{height:100vh;position:sticky;top:0;background:rgba(7,11,24,.96);border-right:1px solid rgba(148,163,184,.14);padding:22px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:22px}.logo{width:50px;height:50px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#0f172a);font-weight:950}.brand h1{margin:0;font-size:23px}.brand small{color:var(--muted)}.nav{display:grid;gap:8px}.nav button{width:100%;justify-content:flex-start;text-align:left;background:transparent;box-shadow:none;border:1px solid transparent}.nav button.active{background:rgba(37,99,235,.18);border-color:rgba(96,165,250,.35)}main{padding:24px;max-width:1500px;width:100%;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.top h2{margin:0;font-size:34px}.page{display:none}.page.active{display:block}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{padding:16px;border-radius:20px;background:#070d18;border:1px solid var(--line)}.stat span{color:var(--muted);font-weight:800}.stat b{display:block;font-size:30px;margin-top:6px}.mobilebar{display:none}.toast{position:fixed;right:18px;bottom:18px;z-index:999;background:#070d18;border:1px solid rgba(34,197,94,.28);border-radius:18px;padding:14px 16px;display:none;box-shadow:var(--shadow)}.toast.show{display:block}.modal-bg{display:none;position:fixed;inset:0;z-index:990;background:rgba(2,6,23,.72);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:18px}.modal-bg.active{display:flex}.modal{width:100%;max-width:560px;max-height:92vh;overflow:auto;background:#111827;border:1px solid var(--line);border-radius:26px;padding:20px}.password-wrap{position:relative}.password-wrap input{padding-right:48px}.eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:36px;height:36px;padding:0;background:rgba(148,163,184,.18)!important;box-shadow:none}.hidden{display:none!important}
@media(max-width:1050px){body{padding-bottom:86px;overflow-x:hidden}.app{display:block}.sidebar{display:none}main{padding:12px}.mobilebar{display:flex;position:fixed;left:10px;right:10px;bottom:8px;z-index:900;background:rgba(7,13,24,.94);border:1px solid rgba(148,163,184,.18);border-radius:24px;padding:8px;gap:6px;overflow:auto;box-shadow:0 16px 45px rgba(0,0,0,.5);backdrop-filter:blur(12px)}.mobilebar button{flex:1 0 72px;min-width:72px;background:transparent!important;box-shadow:none!important;font-size:11px!important;padding:9px 7px!important;border-radius:17px}.mobilebar button.active{background:linear-gradient(135deg,rgba(37,99,235,.42),rgba(29,78,216,.18))!important}.top{display:block}.top h2{font-size:29px}.top .btnrow{margin-top:12px}.grid{gap:12px}.s3,.s4,.s5,.s6,.s7,.s8{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr);gap:10px}.stat{padding:13px;min-height:88px}.stat b{font-size:25px}.card{padding:14px;border-radius:22px}.table-wrap{overflow:visible}table,thead,tbody,tr,th,td{display:block;width:100%}thead{display:none}table{min-width:0}tr{background:#070d18;border:1px solid var(--line);border-radius:18px;margin-bottom:10px;padding:12px;display:grid;gap:8px}td{border:0;padding:0}td:before{content:attr(data-label);display:block;color:var(--muted);font-size:11px;font-weight:900;text-transform:uppercase;margin-bottom:3px}}

body{background:radial-gradient(circle at top,#1d4ed8,#0b1120 42%,#050816)}.wrap{max-width:1180px;margin:0 auto;padding:24px}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:22px;align-items:center;min-height:82vh}.hero h1{font-size:58px;line-height:.95;margin:0}.hero p{font-size:19px;color:#cbd5e1;line-height:1.55}.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.plan{position:relative}.price{font-size:36px;font-weight:950;margin:12px 0}.loginbox{max-width:420px;margin-left:auto}.pix-value{font-size:34px;font-weight:950}.pix-key{background:#070d18;border:1px solid var(--line);border-radius:14px;padding:10px;word-break:break-all}@media(max-width:900px){.hero{display:block;min-height:0}.hero h1{font-size:42px}.plans{grid-template-columns:1fr}.loginbox{margin:18px 0 0}}</style></head><body><div class="wrap">
<div class="hero"><div><div class="badge active">NEX-ZAPP Rebuild V1</div><h1 id="ltitle">Central profissional para WhatsApp.</h1><p id="lsub">Carregando...</p><div class="btnrow"><button class="green" onclick="scrollPlans()">Comprar agora</button><button onclick="openLogin()">Entrar agora</button><button class="purple" onclick="openReseller()">Ser revendedor</button></div></div><div class="card loginbox"><h3>Entrar no painel</h3><label>E-mail</label><input id="loginEmail"><label>Senha</label><input id="loginPass" type="password"><button class="green" style="width:100%;margin-top:14px" onclick="login()">Entrar</button><p class="desc">Admin padrão: admin@nexzapp.local / admin123</p></div></div>
<h2 id="planos">Escolha seu plano</h2><div id="plans" class="plans"></div></div>
<div id="buyModal" class="modal-bg"><div class="modal"><h2>Contratar plano</h2><p class="desc" id="buyPlan"></p><label>Nome</label><input id="buyName"><label>E-mail</label><input id="buyEmail"><label>WhatsApp</label><input id="buyPhone"><label>Senha de acesso</label><input id="buyPass" type="password"><label>Confirmar senha</label><input id="buyPass2" type="password"><label>Nome do pagador</label><input id="payerName"><div class="btnrow" style="margin-top:14px"><button class="green" onclick="makeOrder()">Gerar PIX</button><button class="gray" onclick="buyModal.classList.remove('active')">Fechar</button></div><div id="buyMsg" class="desc" style="margin-top:12px"></div></div></div>
<div id="pixModal" class="modal-bg"><div class="modal"><h2>Pagamento PIX</h2><div id="pixContent"></div><button class="gray" style="width:100%;margin-top:14px" onclick="pixModal.classList.remove('active')">Fechar</button></div></div>
<div id="resModal" class="modal-bg"><div class="modal"><h2>Cadastro de revendedor</h2><label>Nome</label><input id="resName"><label>E-mail</label><input id="resEmail"><label>WhatsApp</label><input id="resPhone"><label>Cidade</label><input id="resCity"><label>Chave PIX</label><input id="resPix"><label>Senha</label><input id="resPass" type="password"><div class="btnrow" style="margin-top:14px"><button class="green" onclick="applyReseller()">Enviar</button><button class="gray" onclick="resModal.classList.remove('active')">Fechar</button></div><div id="resMsg" class="desc"></div></div></div>
<div id="toast" class="toast"></div><script>
function qs(s){return document.querySelector(s)}function qsa(s){return [...document.querySelectorAll(s)]}
function money(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function esc(s){return String(s??'').replace(/[&<>"']/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[x]))}
function badge(s){return `<span class="badge ${String(s||'').toLowerCase()}">${esc(s||'-')}</span>`}
function toast(t){let el=qs('#toast');if(!el)return alert(t);el.innerHTML=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3000)}
function token(){return localStorage.getItem('nz_token')||''}
async function api(u,o={}){o.headers=Object.assign({},o.headers||{}, token()?{Authorization:'Bearer '+token()}:{});let r=await fetch(u,o);let j=await r.json().catch(()=>({success:false,error:'Erro'}));if(r.status===401){localStorage.removeItem('nz_token');location.href='/'}return j}
function setupEyes(){qsa('input[type=password]').forEach(input=>{if(input.dataset.eye)return;input.dataset.eye=1;let w=document.createElement('div');w.className='password-wrap';input.parentNode.insertBefore(w,input);w.appendChild(input);let b=document.createElement('button');b.type='button';b.className='eye-btn';b.textContent='👁';b.onclick=()=>{input.type=input.type==='password'?'text':'password';b.textContent=input.type==='password'?'👁':'🙈'};w.appendChild(b)})}
function labels(){qsa('.table-wrap table').forEach(t=>{let h=qsa('thead th').map(x=>x.textContent.trim());t.querySelectorAll('tbody tr').forEach(tr=>[...tr.children].forEach((td,i)=>td.setAttribute('data-label',h[i]||'')))})}
document.addEventListener('DOMContentLoaded',()=>{setupEyes();setInterval(labels,1000)})

let publicData={plans:[],settings:{},landing:{}}, chosen=null; const ref=new URLSearchParams(location.search).get('ref'); if(ref)localStorage.setItem('nz_ref',ref.toUpperCase());
async function loadPublic(){publicData=await fetch('/api/public').then(r=>r.json());ltitle.textContent=publicData.landing.title;lsub.textContent=publicData.landing.subtitle;plans.innerHTML=publicData.plans.map(p=>`<div class="card plan"><h3>${esc(p.name)}</h3><div class="price">${money(p.price)}</div><p class="desc">${esc(p.description||'')}</p><p>${p.durationDays} dias • ${p.whatsappLimit} WhatsApp(s)</p><button class="green" style="width:100%" onclick="buy('${p.id}')">Comprar agora</button></div>`).join('')}
function scrollPlans(){document.getElementById('planos').scrollIntoView({behavior:'smooth'})}function openLogin(){document.querySelector('.loginbox').scrollIntoView({behavior:'smooth'})}function buy(id){chosen=id;let p=publicData.plans.find(x=>x.id===id);buyPlan.textContent=p.name+' - '+money(p.price);buyModal.classList.add('active')}async function login(){let r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:loginEmail.value,password:loginPass.value})}).then(r=>r.json());if(!r.success)return toast(r.error);localStorage.setItem('nz_token',r.token);location.href=r.role==='admin'?'/admin':r.role==='reseller'?'/revenda':'/app'}
async function makeOrder(){let p=buyPass.value.trim(),p2=buyPass2.value.trim();if(p.length<6)return buyMsg.textContent='Senha mínima de 6 caracteres.';if(p!==p2)return buyMsg.textContent='As senhas não conferem.';let r=await fetch('/api/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({planId:chosen,name:buyName.value,email:buyEmail.value,phone:buyPhone.value,password:p,payerName:payerName.value,ref:localStorage.getItem('nz_ref')||''})}).then(r=>r.json());if(!r.success)return buyMsg.textContent=r.error;let st=r.settings;pixContent.innerHTML=`<div class="pix-value">${money(r.order.value)}</div><p><b>Plano:</b> ${esc(r.order.planName)}</p><p><b>Pagador:</b> ${esc(r.order.payerName)}</p><div class="pix-key" id="pixKey">${esc(st.pixKey||'Configure no admin')}</div><button class="green" style="width:100%;margin-top:10px" onclick="navigator.clipboard.writeText(pixKey.textContent)">Copiar chave PIX</button><p class="desc">${esc(st.instruction||'Envie o comprovante.')}</p><a target="_blank" href="https://wa.me/${st.receiptWhatsapp||st.supportPhone||''}?text=${encodeURIComponent('Olá, fiz o pagamento do plano '+r.order.planName+'. Nome: '+r.order.name)}"><button class="green" style="width:100%">Enviar comprovante no WhatsApp</button></a>`;buyModal.classList.remove('active');pixModal.classList.add('active')}
function openReseller(){resModal.classList.add('active')}async function applyReseller(){let r=await fetch('/api/reseller/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:resName.value,email:resEmail.value,phone:resPhone.value,city:resCity.value,pixKey:resPix.value,password:resPass.value})}).then(r=>r.json());resMsg.textContent=r.message||r.error}
loadPublic()</script></body></html>
